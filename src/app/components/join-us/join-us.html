<section class="py-10 sm:py-16">
    <div class="mb-6 sm:mb-8">
        <div class="flex items-center gap-2 mb-2">
            <base-dot />
            <span class="text-xs font-medium uppercase tracking-widest text-tertiary">Job Openings</span>
        </div>
        <base-text variant="h1" text="Join us" classes="text-secondary" />
    </div>
    
    <div class="mb-8">
        <app-job-filter 
            [activeFilter]="activeFilter()"
            [activeLocation]="activeLocation()"
            [locations]="locations"
            (filterChange)="onFilterChange($event)"
            (locationChange)="onLocationChange($event)"
        />
    </div>
    
    <div class="border-t border-tertiary/20">
        @for (job of filteredJobs(); track job.id) {
            <app-job-card [job]="job" />
        } @empty {
            <div class="py-12 text-center text-tertiary">
                <p>No job openings match your current filters.</p>
            </div>
        }
    </div>
</section>
