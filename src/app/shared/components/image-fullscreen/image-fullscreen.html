<!-- Gallery Grid -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-3">
    @for (image of images; track image; let i = $index) {
        <button 
            (click)="openFullscreen(image)"
            class="gallery-item group aspect-video bg-tertiary/10 rounded-lg overflow-hidden border border-tertiary/20 transition-all duration-300 hover:border-primary/50"
        >
            <img 
                [src]="image" 
                [alt]="alt + ' ' + (i + 1)"
                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            />
            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition-colors duration-300 flex items-center justify-center">
                <div class="w-10 h-10 opacity-0 group-hover:opacity-100 transition-all duration-300 group-hover:scale-100 scale-75">
                    <svg class="w-full h-full text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 8V5a2 2 0 012-2h3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 3h3a2 2 0 012 2v3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 16v3a2 2 0 01-2 2h-3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8 21H5a2 2 0 01-2-2v-3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
        </button>
    }
</div>

<!-- Fullscreen Lightbox -->
@if (fullscreenImage()) {
    <div 
        class="lightbox fixed inset-0 z-50 bg-black/95 flex items-center justify-center"
        (click)="closeFullscreen()"
    >
        <!-- Close Button -->
        <button 
            class="absolute top-6 right-6 w-12 h-12 flex items-center justify-center text-white/70 hover:text-white transition-colors z-10"
            (click)="closeFullscreen()"
        >
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <!-- Previous Button -->
        @if (images.length > 1) {
            <button 
                class="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 flex items-center justify-center text-white/70 hover:text-white transition-colors z-10 rounded-full border border-white/20 hover:border-white/50"
                (click)="$event.stopPropagation(); navigateImage('prev')"
            >
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <!-- Next Button -->
            <button 
                class="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 flex items-center justify-center text-white/70 hover:text-white transition-colors z-10 rounded-full border border-white/20 hover:border-white/50"
                (click)="$event.stopPropagation(); navigateImage('next')"
            >
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        }

        <!-- Image -->
        <div 
            class="max-w-[90vw] max-h-[85vh] flex items-center justify-center"
            (click)="$event.stopPropagation()"
        >
            <img 
                [src]="fullscreenImage()" 
                [alt]="alt"
                class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl"
            />
        </div>

        <!-- Image Counter -->
        @if (images.length > 1) {
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white/70 text-sm">
                {{ getCurrentIndex() }} / {{ images.length }}
            </div>
        }
    </div>
}
