<div 
    class="flex flex-col h-full border border-tertiary/20 rounded-lg p-6"
    style="background-image: url('/assets/card-bg-pattern.png'); background-repeat: repeat;">
    
    <div class="flex items-center gap-2 mb-6">
        <base-dot />
        <span class="text-xs font-medium uppercase tracking-widest text-tertiary">
            {{ plan.index }} {{ plan.name | uppercase }}
        </span>
    </div>

    <div class="flex items-baseline justify-between mb-4">
        <base-text variant="h1" [text]="plan.name" classes="text-secondary" />
        @if (plan.price) {
            <div class="flex items-baseline">
                <base-text variant="h2" [text]="plan.price" classes="text-secondary" />
                <span class="text-tertiary text-sm">{{ plan.priceUnit }}</span>
            </div>
        }
    </div>

    <p class="text-tertiary text-sm">{{ plan.description }}</p>

    <base-divider spacing="md" borderClass="border-tertiary/30" />

    <div class="flex-1 space-y-6">
        @for (group of plan.featureGroups; track group.title) {
            <div>
                <base-text variant="small" [text]="group.title" classes="text-secondary font-medium mb-3 block" />
                <base-ul [items]="group.features" textClass="text-tertiary" markerClass="marker:text-tertiary" />
            </div>
        }
    </div>

    <div class="mt-8 pt-6 border-t border-tertiary/20">
        <button 
            class="w-full py-3 px-4 rounded-lg text-sm font-medium uppercase tracking-wide transition-colors flex items-center justify-center gap-2 text-secondary border border-tertiary/30 hover:border-tertiary/50"
            style="background-color: rgba(var(--color-secondary-rgb), 0.05);">
            {{ plan.ctaLabel }}
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
        </button>
    </div>
</div>
