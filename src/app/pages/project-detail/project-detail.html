@if (project(); as projectData) {
    <div class="w-full py-8">
        <a 
            routerLink="/projects" 
            class="inline-flex items-center gap-2 text-tertiary hover:text-secondary transition-colors mb-6"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            <span class="text-sm uppercase tracking-wide">Back to Projects</span>
        </a>
        
        <div class="grid grid-cols-1 lg:grid-cols-[320px_1fr] gap-8 lg:gap-12">
            <aside class="space-y-8">
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <base-dot />
                        <span class="text-xs font-medium uppercase tracking-widest text-tertiary">Project</span>
                    </div>
                    <h1 class="text-3xl font-bold text-secondary mb-4">{{ projectData.title }}</h1>
                    <a 
                        [href]="projectData.url" 
                        target="_blank"
                        class="inline-flex items-center gap-2 text-primary hover:text-primary/80 transition-colors text-sm"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                        </svg>
                        <span class="break-all">{{ projectData.url }}</span>
                    </a>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <h3 class="text-xs font-medium uppercase tracking-wider text-tertiary mb-1">Date</h3>
                        <base-text variant="text" [text]="formatDate(projectData.date)" classes="text-secondary" />
                    </div>
                </div>
                
                <div class="border-t border-tertiary/20 pt-6">
                    <h3 class="text-xs font-medium uppercase tracking-wider text-tertiary mb-3">Table of Contents</h3>
                    <nav class="space-y-2">
                        <button 
                            (click)="scrollTo('overview')"
                            class="block text-sm text-tertiary hover:text-primary transition-colors text-left"
                        >
                            01 Overview
                        </button>
                        <button 
                            (click)="scrollTo('technologies')"
                            class="block text-sm text-tertiary hover:text-primary transition-colors text-left"
                        >
                            02 Technologies
                        </button>
                        <button 
                            (click)="scrollTo('gallery')"
                            class="block text-sm text-tertiary hover:text-primary transition-colors text-left"
                        >
                            03 Gallery
                        </button>
                    </nav>
                </div>
            </aside>
            
            <main class="space-y-12">
                <section id="overview">
                    <div class="flex items-center gap-2 mb-4">
                        <base-dot />
                        <h2 class="text-xl font-semibold text-secondary">Overview</h2>
                    </div>
                    
                    <base-text variant="text" [text]="projectData.description" classes="text-tertiary" />
                </section>

                <section id="technologies">
                    <div class="flex items-center gap-2 mb-4">
                        <base-dot />
                        <h2 class="text-xl font-semibold text-secondary">Technologies</h2>
                    </div>
                    
                    <div class="flex flex-wrap gap-2">
                        @for (tech of projectData.technologies; track tech) {
                            <span class="px-2 py-1 text-xs sm:px-4 sm:py-2 sm:text-sm text-secondary border border-tertiary/30 rounded-lg">
                                {{ tech }}
                            </span>
                        }
                    </div>
                </section>
                
                <section id="gallery">
                    <div class="flex items-center gap-2 mb-6">
                        <base-dot />
                        <h2 class="text-xl font-semibold text-secondary">Gallery</h2>
                    </div>
                    
                    <base-image-fullscreen 
                        [images]="getAllImages()" 
                        [alt]="projectData.title"
                    />
                </section>
            </main>
        </div>
    </div>
} @else {
    <div class="w-full py-16 text-center">
        <h1 class="text-2xl font-bold text-secondary mb-4">Project Not Found</h1>
        <base-text variant="text" text="The project you're looking for doesn't exist or has been removed." classes="text-tertiary mb-6" />
        <a 
            routerLink="/projects" 
            class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium uppercase tracking-wide text-[color:var(--color-bg)] bg-secondary rounded hover:bg-secondary/90 transition-colors"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Projects
        </a>
    </div>
}
