<div class="flex justify-between items-center">
  <a routerLink="/" class="cursor-pointer flex items-center gap-2">
    <img src="/assets/logo.png" alt="Protovoid Logo" class="w-6 h-6" />
    <base-text variant="h5" classes="uppercase tracking-wider" text="PROTOVOID" />
  </a>
  <div class="flex gap-8 items-center">
    @for (item of items; track $index) {
      <div
        [class]="getNavItemClasses($index)"
        (mouseenter)="onNavItemHover($index)"
        (mouseleave)="onNavItemLeave()">
        <app-nav-item [url]="item.url" [label]="item.label" classes="uppercase"/>
      </div>
    }
    <base-button label="Contact Sales" variant="secondary"/>
    <base-icon-button
      (clicked)="toggleTheme()"
      size="sm"
      variant="ghost"
      [ariaLabel]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (isDarkMode()) {
        <ng-icon name="octMoon" class="w-4 h-4" />
      } @else {
        <ng-icon name="octSun" class="w-4 h-4" />
      }
    </base-icon-button>
  </div>
</div>
<base-separator />
