<div class="flex flex-col gap-1.5">
  @if (label) {
    <label class="text-xs font-medium uppercase tracking-wider text-secondary">
      {{ label }}@if (required) {<span class="text-primary">*</span>}
    </label>
  }
  <input
    [type]="type"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onBlur()"
    class="w-full px-3 py-2.5 bg-transparent border border-tertiary/30 rounded text-secondary text-sm placeholder:text-tertiary/50 focus:outline-none focus:border-tertiary transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
  />
  @if (error) {
    <span class="text-xs text-primary">{{ error }}</span>
  }
</div>
