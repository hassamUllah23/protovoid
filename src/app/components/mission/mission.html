<section class="py-10 sm:py-16">
    <div class="flex items-center gap-2 mb-12">
        <base-dot />
        <span class="text-xs font-medium uppercase tracking-widest text-tertiary">Values</span>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_2fr] gap-12 lg:gap-16 items-start">
        <div class="flex justify-center lg:justify-start">
            <svg 
                class="w-32 h-32 lg:w-40 lg:h-40 text-secondary" 
                viewBox="0 0 100 100" 
                fill="none" 
                xmlns="http://www.w3.org/2000/svg"
            >
                <g stroke="currentColor" stroke-width="1.5">
                    <ellipse cx="50" cy="50" rx="8" ry="35" transform="rotate(0 50 50)" />
                    <ellipse cx="50" cy="50" rx="8" ry="35" transform="rotate(30 50 50)" />
                    <ellipse cx="50" cy="50" rx="8" ry="35" transform="rotate(60 50 50)" />
                    <ellipse cx="50" cy="50" rx="8" ry="35" transform="rotate(90 50 50)" />
                    <ellipse cx="50" cy="50" rx="8" ry="35" transform="rotate(120 50 50)" />
                    <ellipse cx="50" cy="50" rx="8" ry="35" transform="rotate(150 50 50)" />
                </g>
            </svg>
        </div>
        
        <div>
            <div class="text-xl sm:text-2xl lg:text-3xl text-secondary leading-relaxed mb-8">
                <base-text variant="h2" text="At Protovoid, our mission is to " classes="text-secondary inline text-xl sm:text-2xl lg:text-3xl" />
                <base-text variant="h2" text="Bring Autonomy to Software Engineering." classes="text-secondary inline font-medium text-xl sm:text-2xl lg:text-3xl" />
                <base-text variant="h2" text=" In order to accomplish our ambitious goal, we must:" classes="text-secondary inline text-xl sm:text-2xl lg:text-3xl" />
            </div>
            
            <ul class="space-y-3">
                @for (value of values; track value.number) {
                    <li class="flex items-baseline gap-4">
                        <span class="text-sm font-medium text-primary tabular-nums">{{ value.number }}</span>
                        <base-text variant="h5" [text]="value.text" classes="text-secondary" />
                    </li>
                }
            </ul>
        </div>
    </div>
</section>
