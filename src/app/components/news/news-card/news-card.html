<article class="group">
    <div class="flex items-center gap-2 mb-3">
        <span class="px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider rounded border border-tertiary/30 text-tertiary">
            {{ news.tag }}
        </span>
        @if (news.isNew) {
            <span class="px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider rounded bg-primary text-black">
                NEW
            </span>
        }
    </div>
    
    <h3 class="text-lg font-semibold text-secondary mb-3 group-hover:text-primary transition-colors">
        {{ news.heading }}
    </h3>
    
    <base-text variant="text" [text]="news.description" classes="text-tertiary mb-4 line-clamp-3" />
    
    <a 
        [routerLink]="['/news', news.id]"
        class="inline-flex items-center gap-1 text-xs font-medium uppercase tracking-wide text-tertiary hover:text-primary transition-colors"
    >
        Learn more
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
    </a>
</article>
